services:
  # ═════════════ Runtime (default) ═════════════
  postgres:
    image: postgres:15-alpine
    container_name: meridianmed-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: meridianmed
      POSTGRES_USER: meridian
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dev-only-password-change-in-production}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U meridian -d meridianmed"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      target: production
    container_name: meridianmed-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 4000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: meridianmed
      DB_USER: meridian
      DB_PASSWORD: ${POSTGRES_PASSWORD:-dev-only-password-change-in-production}
      JWT_SECRET: ${JWT_SECRET:-dev-only-jwt-secret-do-not-use-in-production}
      JWT_EXPIRES_IN: 15m
      REFRESH_TOKEN_EXPIRES_IN: 8h
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-dev-only-encryption-key-change-me-in-prod}
      THROTTLE_TTL: 60
      THROTTLE_LIMIT: 10
      CORS_ORIGIN: http://localhost:3000
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4000/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 15s
      timeout: 10s
      retries: 5

  frontend:
    build:
      context: ./frontend
      target: production
    container_name: meridianmed-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

  # ═════════════ Test stack (--profile test) ═════════════
  postgres-test:
    image: postgres:15-alpine
    profiles: ["test"]
    container_name: meridianmed-postgres-test
    environment:
      POSTGRES_DB: meridianmed_test
      POSTGRES_USER: meridian
      POSTGRES_PASSWORD: ${TEST_DB_PASSWORD:-test-only-password-not-secret}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U meridian -d meridianmed_test"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Real backend serving the API for tests
  backend-test:
    build:
      context: ./backend
      target: production
    profiles: ["test"]
    container_name: meridianmed-backend-test
    networks:
      default:
        aliases:
          - backend
    environment:
      NODE_ENV: test
      PORT: 4000
      DB_HOST: postgres-test
      DB_PORT: 5432
      DB_NAME: meridianmed_test
      DB_USER: meridian
      DB_PASSWORD: ${TEST_DB_PASSWORD:-test-only-password-not-secret}
      JWT_SECRET: ${TEST_JWT_SECRET:-test-only-jwt-secret-not-for-production}
      JWT_EXPIRES_IN: 15m
      REFRESH_TOKEN_EXPIRES_IN: 8h
      ENCRYPTION_KEY: ${TEST_ENCRYPTION_KEY:-test-only-encryption-key-not-secret}
      THROTTLE_TTL: 60
      THROTTLE_LIMIT: 1000
      CORS_ORIGIN: "*"
    depends_on:
      postgres-test:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4000/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  # Real frontend serving the SPA for Playwright
  frontend-test:
    build:
      context: ./frontend
      target: production
    profiles: ["test"]
    container_name: meridianmed-frontend-test
    depends_on:
      backend-test:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "test -f /var/run/nginx.pid || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 10s

  # Backend test runner: unit + API tests
  backend-tests:
    build:
      context: ./backend
      target: test
    profiles: ["test"]
    container_name: meridianmed-backend-tests
    environment:
      NODE_ENV: test
      DB_HOST: postgres-test
      DB_PORT: 5432
      DB_NAME: meridianmed_test
      DB_USER: meridian
      DB_PASSWORD: ${TEST_DB_PASSWORD:-test-only-password-not-secret}
      JWT_SECRET: ${TEST_JWT_SECRET:-test-only-jwt-secret-not-for-production}
      JWT_EXPIRES_IN: 15m
      REFRESH_TOKEN_EXPIRES_IN: 8h
      ENCRYPTION_KEY: ${TEST_ENCRYPTION_KEY:-test-only-encryption-key-not-secret}
      THROTTLE_TTL: 60
      THROTTLE_LIMIT: 1000
      CORS_ORIGIN: "*"
    depends_on:
      postgres-test:
        condition: service_healthy

  # Frontend test runner: vitest unit + Playwright e2e
  frontend-tests:
    build:
      context: ./frontend
      target: test
    profiles: ["test"]
    container_name: meridianmed-frontend-tests
    environment:
      NODE_ENV: test
      VITE_API_URL: http://backend-test:4000
      E2E_BASE_URL: http://frontend-test
      E2E_API_URL: http://backend-test:4000
    depends_on:
      backend-test:
        condition: service_healthy
      frontend-test:
        condition: service_healthy

volumes:
  postgres-data:
    driver: local
