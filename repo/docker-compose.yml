version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: meridianmed-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: meridianmed
      POSTGRES_USER: meridian
      POSTGRES_PASSWORD: meridian_secret
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U meridian -d meridianmed"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: meridianmed-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 4000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: meridianmed
      DB_USER: meridian
      DB_PASSWORD: meridian_secret
      JWT_SECRET: meridianmed_jwt_secret_key_change_in_prod
      JWT_EXPIRES_IN: 15m
      REFRESH_TOKEN_EXPIRES_IN: 8h
      ENCRYPTION_KEY: meridianmed_aes256_key_32chars_here
      THROTTLE_TTL: 60
      THROTTLE_LIMIT: 10
      CORS_ORIGIN: https://localhost:3000
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- --no-check-certificate https://localhost:4000/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    container_name: meridianmed-frontend
    restart: unless-stopped
    ports:
      - "3000:443"
      - "3080:80"
    depends_on:
      - backend

volumes:
  postgres-data:
    driver: local
