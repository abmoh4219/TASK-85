services:
  # ───────── Runtime stack (default profile) ─────────
  postgres:
    image: postgres:15-alpine
    container_name: meridianmed-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: meridianmed
      POSTGRES_USER: meridian
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dev-only-password-change-in-production}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U meridian -d meridianmed"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: meridianmed-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 4000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: meridianmed
      DB_USER: meridian
      DB_PASSWORD: ${POSTGRES_PASSWORD:-dev-only-password-change-in-production}
      JWT_SECRET: ${JWT_SECRET:-dev-only-jwt-secret-do-not-use-in-production}
      JWT_EXPIRES_IN: 15m
      REFRESH_TOKEN_EXPIRES_IN: 8h
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-dev-only-encryption-key-change-me-in-prod}
      THROTTLE_TTL: 60
      THROTTLE_LIMIT: 10
      CORS_ORIGIN: https://localhost:3000
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- --no-check-certificate https://localhost:4000/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    container_name: meridianmed-frontend
    restart: unless-stopped
    ports:
      - "3000:443"
      - "3080:80"
    depends_on:
      - backend

  # ───────── Test stack (profile: test) ─────────
  postgres-test:
    image: postgres:15-alpine
    profiles: ["test"]
    container_name: meridianmed-postgres-test
    environment:
      POSTGRES_DB: meridianmed_test
      POSTGRES_USER: meridian
      POSTGRES_PASSWORD: ${TEST_DB_PASSWORD:-test-only-password-not-secret}
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U meridian -d meridianmed_test"]
      interval: 5s
      timeout: 5s
      retries: 10

  test:
    build:
      context: .
      dockerfile: backend/Dockerfile.test
    profiles: ["test"]
    container_name: meridianmed-test-runner
    environment:
      NODE_ENV: test
      PORT: 4000
      DB_HOST: postgres-test
      DB_PORT: 5432
      DB_NAME: meridianmed_test
      DB_USER: meridian
      DB_PASSWORD: ${TEST_DB_PASSWORD:-test-only-password-not-secret}
      JWT_SECRET: ${TEST_JWT_SECRET:-test-only-jwt-secret-not-for-production}
      JWT_EXPIRES_IN: 15m
      REFRESH_TOKEN_EXPIRES_IN: 8h
      ENCRYPTION_KEY: ${TEST_ENCRYPTION_KEY:-test-only-encryption-key-not-secret}
      THROTTLE_TTL: 60
      THROTTLE_LIMIT: 100
      CORS_ORIGIN: http://localhost:3000
    depends_on:
      postgres-test:
        condition: service_healthy

volumes:
  postgres-data:
    driver: local
